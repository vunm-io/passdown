name: ci

on:
  workflow_call:
  push:
    branches: [main, 'release/**']
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate JSON files
        run: |
          while IFS= read -r -d '' f; do
            echo "checking $f"
            jq empty "$f"
          done < <(find . -name "*.json" -not -path "*/node_modules/*" -print0)

      - name: Validate shell scripts
        run: |
          bash -n install.sh scripts/*.sh tests/*.sh
          shellcheck install.sh scripts/*.sh tests/*.sh

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install plugin CLIs
        run: |
          npm install -g \
            @anthropic-ai/claude-code@2.1.193 \
            @openai/codex@0.142.5

      - name: Validate plugin + marketplace manifests (strict)
        run: ./scripts/validate-plugin.sh

      - name: Run installer regressions
        run: ./tests/install.sh

      - name: Run skill contract tests
        run: ./tests/skills.sh

      - name: Check version agreement
        run: ./tests/version.sh

      - name: Check release workflow contracts
        run: ./tests/release.sh

      - name: Check documentation contracts
        run: ./tests/docs.sh

      - name: Smoke-test Codex marketplace install
        run: |
          codex_home="$(mktemp -d)"
          CODEX_HOME="$codex_home" codex plugin marketplace add "$GITHUB_WORKSPACE"
          CODEX_HOME="$codex_home" codex plugin add passdown@passdown
          version="$(cat VERSION)"
          CODEX_HOME="$codex_home" codex plugin list |
            awk -v version="$version" '
              $1 == "passdown@passdown" &&
              $2 == "installed," &&
              $3 == "enabled" &&
              $4 == version { found = 1 }
              END { exit !found }
            '

      - name: Validate passdown OpenSpec schema
        run: |
          scratch="$(mktemp -d)"
          ./install.sh --into "$scratch"
          cd "$scratch"
          npx --yes @fission-ai/openspec@1.5.0 schema validate passdown

      - name: Check examples/basic-workspace schema copy is in sync
        run: |
          diff -r schemas/passdown examples/basic-workspace/openspec/schemas/passdown
