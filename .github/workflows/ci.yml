name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "*/node_modules/*"); do
            echo "checking $f"
            jq empty "$f"
          done

      - name: Shellcheck install.sh
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          ignore_paths: node_modules

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate passdown OpenSpec schema
        run: |
          scratch="$(mktemp -d)"
          ./install.sh --into "$scratch"
          cd "$scratch"
          npx --yes @fission-ai/openspec@1.5.0 schema validate passdown
