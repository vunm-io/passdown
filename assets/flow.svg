<svg width="100%" viewBox="0 0 680 132" role="img" xmlns="http://www.w3.org/2000/svg">
<title>passdown flow: inbox to intake to dispatch to handoff</title>
<desc>Left to right: inbox (raw notes) to intake (planned work) to dispatch (best executor) to handoff (next session).</desc>
<defs>
<marker id="fa-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="fa-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="1" y="1" width="678" height="130" rx="14" fill="#0d1117" stroke="#22303f" stroke-width="1"/>
<rect x="40" y="40" width="130" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="105" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#e6edf3" text-anchor="middle">inbox</text>
<text x="105" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#6e7681" text-anchor="middle">raw notes</text>
<line x1="174" y1="66" x2="192" y2="66" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fa-gray)"/>
<rect x="196" y="40" width="130" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="261" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#e6edf3" text-anchor="middle">intake</text>
<text x="261" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#6e7681" text-anchor="middle">planned work</text>
<line x1="330" y1="66" x2="348" y2="66" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fa-gray)"/>
<rect x="352" y="40" width="130" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="417" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#e6edf3" text-anchor="middle">dispatch</text>
<text x="417" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#6e7681" text-anchor="middle">best executor</text>
<line x1="486" y1="66" x2="504" y2="66" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#fa-teal)"/>
<rect x="508" y="40" width="130" height="52" rx="8" fill="#0f2b2a" stroke="#2dd4bf" stroke-width="1.2"/>
<text x="573" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#2dd4bf" text-anchor="middle">handoff</text>
<text x="573" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#5eead4" text-anchor="middle">next session</text>
</svg>